{% extends 'basic.html' %}
{% block title %}All SOngs {% endblock %}
{% block body %}
<div class="container" style="background-color: crimson; margin-top: 3%;"><h3 style="text-align: center;">All Songs</h3></div>
<div class="container" style="margin-top: 3%;">
    {% for i in song %}
    <div class="card mb-3" style="max-width: 940px; padding-top: 3%;">
        <div class="row no-gutters">
          <div class="col-md-4">
            <img src="/documents/{{i.image}}" class="card-img" alt="...">
          </div>
          <div class="col-md-8">
            <div class="card-body">
              <h5 class="card-title" style="color:black; font:550">{{i.name}}</h5>
              <p class="card-text">{{i.tags}}</p>
              <a href="/musicplayer/songs/{{i.song_id}}"><button class="btn btn-outline-danger">Listen Songs</button></a>
            </div>
          </div>
        </div>
      </div>
    {% endfor %}
</div>
{% endblock %}

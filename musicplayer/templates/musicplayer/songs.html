{%load static %}
<!DOCTYPE html>
<html>

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="mobile-web-app-capable" content="yes">

 

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@700&family=Josefin+Sans:ital@1&family=Josefin+Slab:wght@700&family=Kalam&family=Long+Cang&family=Rakkas&display=swap"
    rel="stylesheet">
  <link rel='stylesheet' href="{% static 'css/nav.css' %}">

  <title>{% block title %}All Songs{% endblock %}</title>
</head>

<body>
  {% block body %}
  {% include 'musicplayer/nav.html' %}
  <div class="container" style="background-color: crimson; margin-top: 8%;">
    <h3 style="text-align: center;">All Songs</h3>
  </div>
  <div class="container" style="margin-top: 3%;">
    {% for i in song %}
    <div class="card mb-3" style="max-width: 940px; padding-top: 3%;">
      <div class="row no-gutters">
        <div class="col-md-4">
          <img src="/documents/{{i.image}}" class="card-img" alt="...">
        </div>
        <div class="col-md-8">
          <div class="card-body">
            <h5 class="card-title" style="color:black; font:550">{{i.name}}</h5>
            <p class="card-text">{{i.tags}}</p>
            <a href="/musicplayer/songs/{{i.song_id}}"><button class="btn btn-outline-danger">Listen Songs</button></a>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
  {% endblock %}
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"
    integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
    integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
    crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"
    integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV"
    crossorigin="anonymous"></script>
  <script src="{% static 'js/nav.js' %}"></script>
</body>

</html>

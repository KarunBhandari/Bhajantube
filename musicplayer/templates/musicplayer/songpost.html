{% extends 'basic.html' %}
{% block title %}All SOngs {% endblock %}
{% block body %}
<div class="container" style="margin-top: 3%;">
    
    <div class="row">
        <div class="col-md-4">
            <img src="/documents/{{song.image}}" alt="" height="400px" width="650px" style="position: relative; ">
        </div>
        <div class="col-md-6" style="padding-left: 30%;">
            <h5 style="padding-top: 3%; font-weight:500">{{song.name}}</h5><br>
            <h5 style="padding-top: 3%; font-weight:500">{{song.singer}}</h5><br>
            <h5 style="padding-top: 3%; font-weight:500">{{song.tags}}</h5><br>
            <audio controls>
                <source src="/documents/{{song.song}}" type="audio/mp3" />
            </audio>
        </div>
    </div>
    
</div>
{% endblock %}

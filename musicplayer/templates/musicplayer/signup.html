{% extends 'basic.html' %}
{% block title %}Signup{% endblock %}

{% block body %}
<div class="container">

    <form method="post" action="musicplayer/signup">
      {% csrf_token %}
        <div class="form-group">
          <label for="exampleInputEmail1">Username</label>
          <input type="text" class="form-control" placeholder="Username" name="FullName">
        </div>
        <div class="form-group">
          <label for="exampleInputPassword1">Password</label>
          <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password" name="Password">
        </div>
        <div class="form-group">
            <label for="exampleInputPassword1">Re-type Password</label>
            <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Confirm Password" name="Password">
          </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
</div>

 {% endblock %}
